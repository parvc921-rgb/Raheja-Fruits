name: Deploy Functions & Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "packages/shared/**"
      - "firestore.rules"
      - "firestore.indexes.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter functions build

      - uses: w9jds/firebase-action@v13
        with:
          args: deploy --only functions,firestore:rules,firestore:indexes
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          PROJECT_ID: raheja-fruits
